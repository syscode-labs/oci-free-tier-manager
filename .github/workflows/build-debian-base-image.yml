name: Build Debian Base ARM64 Image

on:
  workflow_dispatch:

env:
  OCI_COMPARTMENT: ocid1.compartment.oc1..aaaaaaaahox2upn7fvv4mhoifgbnshs42xlejatfcinkje26faq7yds3yffq
  OCI_NAMESPACE: lrbmlfacfnqw
  OCI_BUCKET: proxmox-images
  OCI_REGION: uk-london-1
  SSH_PRIVATE_KEY_PATH: /tmp/oci_builder_ssh

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap \
            qemu-utils \
            jq \
            parted \
            dosfstools \
            e2fsprogs \
            netcat-openbsd \
            python3-pip
          pip3 install oci-cli --quiet

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${OCI_REGION}
          key_file=~/.oci/oci_api_key.pem
          EOF
          echo "${{ secrets.OCI_API_KEY_PEM }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Write SSH key for smoke test
        run: |
          cat <<'EOF' > "${SSH_PRIVATE_KEY_PATH}"
          ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 "${SSH_PRIVATE_KEY_PATH}"
          SSH_PUBLIC_KEY="$(ssh-keygen -y -f "${SSH_PRIVATE_KEY_PATH}")"
          echo "SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY}" >> "$GITHUB_ENV"

      - name: Build Debian base disk image (native ARM64 debootstrap)
        run: |
          chmod +x scripts/build-debian-base-disk.sh
          sudo -E scripts/build-debian-base-disk.sh
          ls -lh /tmp/debian-base-arm64.qcow2
        timeout-minutes: 45

      - name: Compress and upload workflow artifact
        run: |
          zstd -T0 -19 -f /tmp/debian-base-arm64.qcow2 -o /tmp/debian-base-arm64.qcow2.zst
          ls -lh /tmp/debian-base-arm64.qcow2.zst

      - uses: actions/upload-artifact@v4
        with:
          name: debian-base-arm64-qcow2-zst
          path: /tmp/debian-base-arm64.qcow2.zst
          if-no-files-found: error

      - name: Upload QCOW2 to OCI Object Storage
        run: |
          IMAGE_NAME="debian-base-arm64-$(date +%Y%m%d%H%M%S).qcow2"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          oci os object put \
            --namespace "${OCI_NAMESPACE}" \
            --bucket-name "${OCI_BUCKET}" \
            --file /tmp/debian-base-arm64.qcow2 \
            --name "${IMAGE_NAME}"

      - name: Import as OCI custom image
        run: |
          IMAGE_OCID=$(oci compute image import from-object \
            --compartment-id "${OCI_COMPARTMENT}" \
            --namespace "${OCI_NAMESPACE}" \
            --bucket-name "${OCI_BUCKET}" \
            --name "${IMAGE_NAME}" \
            --display-name "oci-freetier-ampere-a1flex-debian-base-$(date +%Y%m%d%H%M%S)" \
            --source-image-type QCOW2 \
            --launch-mode PARAVIRTUALIZED \
            --query 'data.id' --raw-output)
          echo "IMAGE_OCID=${IMAGE_OCID}" >> "$GITHUB_ENV"
          while true; do
            STATE=$(oci compute image get \
              --image-id "${IMAGE_OCID}" \
              --query 'data."lifecycle-state"' --raw-output)
            echo "image-state=${STATE}"
            [ "${STATE}" = "AVAILABLE" ] && break
            [ "${STATE}" = "DELETED" ] && exit 1
            sleep 20
          done
          oci compute image-shape-compatibility-entry add \
            --image-id "${IMAGE_OCID}" \
            --shape-name VM.Standard.A1.Flex

      - name: Smoke test imported Debian base image (single instance)
        run: |
          set -euo pipefail

          SMOKE_NAME="debian-base-smoketest-${GITHUB_RUN_ID}"
          SMOKE_AD="${{ secrets.OCI_AVAILABILITY_DOMAIN }}"
          if [ -z "${SMOKE_AD}" ]; then
            SMOKE_AD=$(oci iam availability-domain list \
              --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
              --query 'data[0].name' --raw-output)
          fi

          SMOKE_SUBNET="${{ secrets.OCI_SUBNET_OCID }}"
          if [ -z "${SMOKE_SUBNET}" ]; then
            SMOKE_SUBNET=$(oci network subnet list \
              --compartment-id "${OCI_COMPARTMENT}" \
              --query 'data[?"display-name"==`free-tier-subnet`][0].id' \
              --raw-output)
          fi

          SMOKE_METADATA_JSON=$(mktemp)
          jq -n --arg key "${SSH_PUBLIC_KEY}" '{ssh_authorized_keys: $key}' > "${SMOKE_METADATA_JSON}"

          SMOKE_ID=$(oci compute instance launch \
            --availability-domain "${SMOKE_AD}" \
            --compartment-id "${OCI_COMPARTMENT}" \
            --shape VM.Standard.A1.Flex \
            --shape-config '{"ocpus":1,"memoryInGBs":6}' \
            --subnet-id "${SMOKE_SUBNET}" \
            --assign-public-ip true \
            --display-name "${SMOKE_NAME}" \
            --image-id "${IMAGE_OCID}" \
            --metadata "file://${SMOKE_METADATA_JSON}" \
            --query 'data.id' --raw-output)

          cleanup() {
            oci compute instance terminate \
              --instance-id "${SMOKE_ID}" \
              --preserve-boot-volume false \
              --force >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            STATE=$(oci compute instance get \
              --instance-id "${SMOKE_ID}" \
              --query 'data."lifecycle-state"' --raw-output)
            [ "${STATE}" = "RUNNING" ] && break
            sleep 5
          done

          SMOKE_IP=$(oci compute instance list-vnics \
            --instance-id "${SMOKE_ID}" \
            --query 'data[0]."public-ip"' --raw-output)
          [ -n "${SMOKE_IP}" ] && [ "${SMOKE_IP}" != "null" ]

          for i in $(seq 1 18); do
            echo "ssh-probe=${i}"
            if nc -vz -w 8 "${SMOKE_IP}" 22; then
              if timeout 20 ssh \
                -i "${SSH_PRIVATE_KEY_PATH}" \
                -o BatchMode=yes \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=8 \
                ubuntu@"${SMOKE_IP}" \
                'echo ok && id -un && hostname'; then
                echo "Debian base smoke test passed"
                exit 0
              fi
            fi
            sleep 15
          done

          echo "Debian base smoke test failed: cannot SSH ubuntu@${SMOKE_IP}"
          exit 1

      - name: Summarize output
        run: |
          {
            echo "### Debian Base Build Output"
            echo ""
            echo "- Image OCID: \`${IMAGE_OCID}\`"
            echo "- Object Name: \`${IMAGE_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"
