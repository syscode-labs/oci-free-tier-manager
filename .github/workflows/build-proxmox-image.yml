name: Build Proxmox ARM64 Image

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "Image target to build"
        required: true
        default: "debian-base"
        type: choice
        options:
          - debian-base
          - proxmox

env:
  OCI_COMPARTMENT: ocid1.compartment.oc1..aaaaaaaahox2upn7fvv4mhoifgbnshs42xlejatfcinkje26faq7yds3yffq
  OCI_NAMESPACE: lrbmlfacfnqw
  OCI_BUCKET: proxmox-images
  OCI_REGION: uk-london-1
  SSH_PRIVATE_KEY_PATH: /tmp/oci_builder_ssh

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap \
            qemu-utils \
            qemu-system-arm \
            cloud-image-utils \
            netcat-openbsd \
            zstd \
            jq \
            parted \
            dosfstools \
            e2fsprogs \
            python3-pip
          pip3 install oci-cli --quiet

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${OCI_REGION}
          key_file=~/.oci/oci_api_key.pem
          EOF
          echo "${{ secrets.OCI_API_KEY_PEM }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Generate ephemeral SSH key for smoke checks
        run: |
          ssh-keygen -t ed25519 -N "" -f "$SSH_PRIVATE_KEY_PATH" -C "ci-smoke" >/dev/null
          chmod 600 "$SSH_PRIVATE_KEY_PATH" "${SSH_PRIVATE_KEY_PATH}.pub"

      - name: Build Proxmox disk image (native ARM64 debootstrap)
        run: |
          TARGET="${{ github.event.inputs.build_target }}"
          if [ "${TARGET}" = "debian-base" ]; then
            chmod +x scripts/build-debian-base-disk.sh
            sudo -E scripts/build-debian-base-disk.sh
            RAW_PATH="/tmp/debian-base-arm64.qcow2"
            echo "RAW_IMAGE_PATH=${RAW_PATH}" >> "$GITHUB_ENV"
            echo "IMAGE_KIND=debian-base" >> "$GITHUB_ENV"
          else
            chmod +x scripts/build-proxmox-disk.sh
            sudo -E scripts/build-proxmox-disk.sh
            RAW_PATH="/tmp/proxmox-arm64.qcow2"
            echo "RAW_IMAGE_PATH=${RAW_PATH}" >> "$GITHUB_ENV"
            echo "IMAGE_KIND=proxmox" >> "$GITHUB_ENV"
          fi
          ls -lh "${RAW_PATH}"
        timeout-minutes: 60

      - name: Local parity smoke test (NoCloud, localhost-only SSH)
        if: github.event.inputs.build_target != 'debian-base'
        run: |
          chmod +x scripts/smoke-image-unraid-local.sh
          SSH_PUB_FILE=/tmp/oci_builder_ssh.pub
          ssh-keygen -y -f "$SSH_PRIVATE_KEY_PATH" > "$SSH_PUB_FILE"
          VM_ARCH=arm64 \
            SSH_PUB_KEY_PATH="$SSH_PUB_FILE" \
            SSH_PRIV_KEY_PATH="$SSH_PRIVATE_KEY_PATH" \
            scripts/smoke-image-unraid-local.sh "${RAW_IMAGE_PATH}"
        timeout-minutes: 20

      - name: Compress image and evaluate GitHub mirror eligibility
        run: |
          set -euo pipefail
          COMPRESSED_PATH="/tmp/${IMAGE_KIND}-arm64.qcow2.zst"
          zstd -T0 -19 -f "${RAW_IMAGE_PATH}" -o "${COMPRESSED_PATH}"
          COMPRESSED_SIZE=$(stat -c%s "$COMPRESSED_PATH")
          echo "COMPRESSED_IMAGE_PATH=${COMPRESSED_PATH}" >> "$GITHUB_ENV"
          echo "COMPRESSED_IMAGE_SIZE=${COMPRESSED_SIZE}" >> "$GITHUB_ENV"
          if [ "$COMPRESSED_SIZE" -le 2147483648 ]; then
            echo "MIRROR_TO_GITHUB=true" >> "$GITHUB_ENV"
          else
            echo "MIRROR_TO_GITHUB=false" >> "$GITHUB_ENV"
          fi
          ls -lh "$COMPRESSED_PATH"
          echo "Compressed size bytes: ${COMPRESSED_SIZE}"

      - name: Upload compressed image as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_KIND }}-arm64-qcow2-zst
          path: ${{ env.COMPRESSED_IMAGE_PATH }}
          if-no-files-found: error

      - name: Upload QCOW2 to OCI Object Storage
        run: |
          IMAGE_NAME="${IMAGE_KIND}-ampere-arm64-$(date +%Y%m%d%H%M%S).qcow2"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          oci os object put \
            --namespace ${OCI_NAMESPACE} \
            --bucket-name ${OCI_BUCKET} \
            --file "${RAW_IMAGE_PATH}" \
            --name "${IMAGE_NAME}"

      - name: Import as OCI custom image
        run: |
          IMAGE_OCID=$(oci compute image import from-object \
            --compartment-id ${OCI_COMPARTMENT} \
            --namespace ${OCI_NAMESPACE} \
            --bucket-name ${OCI_BUCKET} \
            --name "${IMAGE_NAME}" \
            --display-name "oci-freetier-ampere-a1flex-${IMAGE_KIND}-$(date +%Y%m%d%H%M%S)" \
            --source-image-type QCOW2 \
            --launch-mode PARAVIRTUALIZED \
            --query 'data.id' --raw-output)
          echo "IMAGE_OCID=${IMAGE_OCID}" >> "$GITHUB_ENV"
          echo "Importing: ${IMAGE_OCID}"
          while true; do
            STATE=$(oci compute image get \
              --image-id "${IMAGE_OCID}" \
              --query 'data."lifecycle-state"' --raw-output)
            echo "  state: ${STATE}"
            [ "${STATE}" = "AVAILABLE" ] && break
            [ "${STATE}" = "DELETED" ] && exit 1
            sleep 30
          done
          oci compute image-shape-compatibility-entry add \
            --image-id "${IMAGE_OCID}" \
            --shape-name VM.Standard.A1.Flex
          echo "Image ready: ${IMAGE_OCID}"

      - name: Wait for Always Free A1 capacity before smoke launch
        run: |
          set -euo pipefail
          SMOKE_AD="${{ secrets.OCI_AVAILABILITY_DOMAIN }}"
          if [ -z "${SMOKE_AD}" ]; then
            SMOKE_AD=$(oci iam availability-domain list \
              --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
              --query 'data[0].name' --raw-output)
          fi

          echo "Checking A1 capacity in ${SMOKE_AD}"
          for i in $(seq 1 30); do
            STATUS=$(oci compute shape availability list \
              --compartment-id "${OCI_COMPARTMENT}" \
              --availability-domain "${SMOKE_AD}" \
              --query 'data[?shape==`VM.Standard.A1.Flex`][0]."availability-status"' \
              --raw-output 2>/dev/null || echo "UNKNOWN")
            echo "capacity-check ${i}/30: ${STATUS}"
            if [ "${STATUS}" = "AVAILABLE" ]; then
              exit 0
            fi
            sleep 20
          done
          echo "A1 capacity unavailable in ${SMOKE_AD}"
          exit 1

      - name: Smoke test imported image (single instance, ubuntu SSH)
        run: |
          set -euo pipefail

          SMOKE_NAME="proxmox-smoketest-${GITHUB_RUN_ID}"
          SMOKE_AD="${{ secrets.OCI_AVAILABILITY_DOMAIN }}"
          if [ -z "${SMOKE_AD}" ]; then
            SMOKE_AD=$(oci iam availability-domain list \
              --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
              --query 'data[0].name' --raw-output)
          fi

          SMOKE_SUBNET="${{ secrets.OCI_SUBNET_OCID }}"
          if [ -z "${SMOKE_SUBNET}" ]; then
            SMOKE_SUBNET=$(oci network subnet list \
              --compartment-id "${OCI_COMPARTMENT}" \
              --query 'data[?"display-name"==`free-tier-subnet`][0].id' \
              --raw-output)
          fi

          SMOKE_PUBKEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          if [ -z "${SMOKE_PUBKEY}" ]; then
            SMOKE_PUBKEY=$(ssh-keygen -y -f "$SSH_PRIVATE_KEY_PATH")
          fi

          [ -n "${SMOKE_AD}" ] && [ "${SMOKE_AD}" != "null" ]
          [ -n "${SMOKE_SUBNET}" ] && [ "${SMOKE_SUBNET}" != "null" ]
          [ -n "${SMOKE_PUBKEY}" ]

          SMOKE_METADATA_JSON=$(mktemp)
          jq -n --arg key "${SMOKE_PUBKEY}" '{ssh_authorized_keys: $key}' > "${SMOKE_METADATA_JSON}"
          echo "Launching smoke-test instance: ${SMOKE_NAME}"
          SMOKE_ID=$(oci compute instance launch \
            --availability-domain "${SMOKE_AD}" \
            --compartment-id "${OCI_COMPARTMENT}" \
            --shape VM.Standard.A1.Flex \
            --shape-config '{"ocpus":1,"memoryInGBs":6}' \
            --subnet-id "${SMOKE_SUBNET}" \
            --assign-public-ip true \
            --display-name "${SMOKE_NAME}" \
            --image-id "${IMAGE_OCID}" \
            --metadata "file://${SMOKE_METADATA_JSON}" \
            --query 'data.id' --raw-output)
          echo "SMOKE_ID=${SMOKE_ID}" >> "$GITHUB_ENV"

          cleanup() {
            if [ -n "${SMOKE_ID:-}" ]; then
              echo "Terminating smoke-test instance ${SMOKE_ID}"
              oci compute instance terminate \
                --instance-id "${SMOKE_ID}" \
                --preserve-boot-volume false \
                --force >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          echo "Waiting for instance RUNNING..."
          for _ in $(seq 1 60); do
            STATE=$(oci compute instance get \
              --instance-id "${SMOKE_ID}" \
              --query 'data."lifecycle-state"' --raw-output)
            [ "${STATE}" = "RUNNING" ] && break
            sleep 5
          done

          SMOKE_IP=$(oci compute instance list-vnics \
            --instance-id "${SMOKE_ID}" \
            --query 'data[0]."public-ip"' --raw-output)
          echo "Smoke-test public IP: ${SMOKE_IP}"
          [ -n "${SMOKE_IP}" ] && [ "${SMOKE_IP}" != "null" ]

          # Prove port 22 and ubuntu login work on a fresh instance.
          chmod 600 "$SSH_PRIVATE_KEY_PATH"
          for i in $(seq 1 12); do
            echo "SSH probe attempt ${i}/12"
            if nc -vz -w 8 "${SMOKE_IP}" 22; then
              if timeout 20 ssh \
                -i "$SSH_PRIVATE_KEY_PATH" \
                -o BatchMode=yes \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=8 \
                ubuntu@"${SMOKE_IP}" \
                'echo ok && hostname && id -un'; then
                echo "Smoke test passed."
                exit 0
              fi
            fi
            sleep 20
          done

          echo "Smoke test failed: cannot SSH as ubuntu to ${SMOKE_IP}"
          exit 1

      - name: Mirror compressed image to GitHub Release (<= 2 GiB)
        if: env.MIRROR_TO_GITHUB == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.IMAGE_KIND }}-arm64-${{ github.run_id }}"
          name: "${{ env.IMAGE_KIND }} ARM64 image ${{ env.IMAGE_NAME }}"
          files: ${{ env.COMPRESSED_IMAGE_PATH }}
          fail_on_unmatched_files: true
          generate_release_notes: false
          body: |
            Automated mirror of compressed Proxmox ARM64 image from CI.
            Source OCI object: `${{ env.IMAGE_NAME }}`
            Imported OCI image OCID: `${{ env.IMAGE_OCID }}`
            Compressed size (bytes): `${{ env.COMPRESSED_IMAGE_SIZE }}`

      - name: Open PR with new image OCID
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: record ${{ env.IMAGE_KIND }} image OCID ${{ env.IMAGE_OCID }}"
          title: "chore: new ${{ env.IMAGE_KIND }} ARM64 image — ${{ env.IMAGE_NAME }}"
          body: |
            Automated Proxmox image build via native debootstrap on ARM64 runner.

            **Image OCID:** `${{ env.IMAGE_OCID }}`
            **Image name:** `${{ env.IMAGE_NAME }}`

            To deploy: set `proxmox_image_ocid` in `tofu/oci/terraform.tfvars`:
            ```hcl
            proxmox_image_ocid = "${{ env.IMAGE_OCID }}"
            ```
            Then run `tofu apply` in `tofu/oci/`.
          branch: "chore/update-proxmox-image"
          delete-branch: true
