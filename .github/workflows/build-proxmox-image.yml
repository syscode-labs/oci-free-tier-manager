name: Build Proxmox ARM64 Image

on:
  workflow_dispatch:

  push:
    paths:
      - "scripts/build-proxmox-disk.sh"
    branches: [main]

env:
  OCI_COMPARTMENT: ocid1.compartment.oc1..aaaaaaaahox2upn7fvv4mhoifgbnshs42xlejatfcinkje26faq7yds3yffq
  OCI_NAMESPACE: lrbmlfacfnqw
  OCI_BUCKET: proxmox-images
  OCI_REGION: uk-london-1

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap \
            qemu-utils \
            parted \
            dosfstools \
            e2fsprogs \
            python3-pip
          pip3 install oci-cli --quiet

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${OCI_REGION}
          key_file=~/.oci/oci_api_key.pem
          EOF
          echo "${{ secrets.OCI_API_KEY_PEM }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Build Proxmox disk image (native ARM64 debootstrap)
        run: |
          chmod +x scripts/build-proxmox-disk.sh
          sudo -E scripts/build-proxmox-disk.sh
          ls -lh /tmp/proxmox-arm64.qcow2
        timeout-minutes: 60

      - name: Upload QCOW2 to OCI Object Storage
        run: |
          IMAGE_NAME="proxmox-ampere-arm64-$(date +%Y%m%d%H%M%S).qcow2"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          oci os object put \
            --namespace ${OCI_NAMESPACE} \
            --bucket-name ${OCI_BUCKET} \
            --file /tmp/proxmox-arm64.qcow2 \
            --name "${IMAGE_NAME}"

      - name: Import as OCI custom image
        run: |
          IMAGE_OCID=$(oci compute image import from-object \
            --compartment-id ${OCI_COMPARTMENT} \
            --namespace ${OCI_NAMESPACE} \
            --bucket-name ${OCI_BUCKET} \
            --name "${IMAGE_NAME}" \
            --display-name "oci-freetier-ampere-a1flex-proxmox-$(date +%Y%m%d%H%M%S)" \
            --source-image-type QCOW2 \
            --launch-mode PARAVIRTUALIZED \
            --query 'data.id' --raw-output)
          echo "IMAGE_OCID=${IMAGE_OCID}" >> "$GITHUB_ENV"
          echo "Importing: ${IMAGE_OCID}"
          while true; do
            STATE=$(oci compute image get \
              --image-id "${IMAGE_OCID}" \
              --query 'data."lifecycle-state"' --raw-output)
            echo "  state: ${STATE}"
            [ "${STATE}" = "AVAILABLE" ] && break
            [ "${STATE}" = "DELETED" ] && exit 1
            sleep 30
          done
          oci compute image-shape-compatibility-entry add \
            --image-id "${IMAGE_OCID}" \
            --shape-name VM.Standard.A1.Flex
          echo "Image ready: ${IMAGE_OCID}"

      - name: Update tofu/oci/terraform.tfvars with new OCID
        run: |
          sed -i "s|proxmox_image_ocid = \".*\"|proxmox_image_ocid = \"${IMAGE_OCID}\"|" \
            tofu/oci/terraform.tfvars
          grep "proxmox_image_ocid" tofu/oci/terraform.tfvars

      - name: Open PR with updated OCID
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Proxmox image OCID to ${{ env.IMAGE_OCID }}"
          title: "chore: new Proxmox ARM64 image available"
          body: |
            Automated Proxmox image build via debootstrap on ARM64 runner.

            **Image OCID:** `${{ env.IMAGE_OCID }}`
            **Image name:** `${{ env.IMAGE_NAME }}`

            Sets `proxmox_image_ocid` in `tofu/oci/terraform.tfvars`.
            After merging: run `tofu apply` in `tofu/oci/` to deploy instances.
          branch: "chore/update-proxmox-image"
          delete-branch: true
          add-paths: tofu/oci/terraform.tfvars
