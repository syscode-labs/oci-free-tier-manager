name: Deploy

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "manual"
      targets:
        description: "Space-separated addresses passed as -target (empty = full plan). For one-off additive rollouts."
        required: false
        default: ""
      apply:
        description: "Apply after plan (true) or plan-only for review (false)."
        required: false
        default: "false"
      vpn_probe:
        description: "Create the temporary OCI VPN probe instance (targeted workflow only)."
        required: false
        default: "false"
      destroy:
        description: "Run targeted destroy. Requires targets and apply=true."
        required: false
        default: "false"
      allow_replace:
        description: "Allow delete/create replacement, but only for explicit targets."
        required: false
        default: "false"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Tofu Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Talos image OCID from oci-talos-gitops-apps
        id: talos_image
        run: |
          OCID=$(curl -fsSL \
            "https://raw.githubusercontent.com/syscode-labs/oci-talos-gitops-apps/main/omni/talos-image.yaml" \
            | grep '^oci_image_ocid:' | awk '{print $2}')
          if [ -z "$OCID" ] || [ "$OCID" = '""' ] || [ "$OCID" = "null" ]; then
            echo "ERROR: oci_image_ocid is empty in oci-talos-gitops-apps/omni/talos-image.yaml"
            echo "Run the talos-images build workflow first to import a Talos image into OCI."
            exit 1
          fi
          echo "ocid=${OCID}" >> "$GITHUB_OUTPUT"
          echo "Talos image OCID: ${OCID}"

      - name: Write OCI credentials
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_API_KEY_PEM" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          OCI_REGION: ${{ secrets.OCI_REGION }}

      - name: Write backend config
        run: printf '%s' "$TF_BACKEND_CONFIG" > tofu/oci/backend-config.tfvars
        env:
          TF_BACKEND_CONFIG: ${{ secrets.TF_BACKEND_CONFIG }}

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Check free tier capacity
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          echo "Querying live OCI state for compartment ${OCI_COMPARTMENT_OCID}"

          INSTANCES=$(oci compute instance list \
            --compartment-id "$OCI_COMPARTMENT_OCID" \
            --all --output json 2>/dev/null || echo '{"data":[]}')

          LIVE_STATES='.["lifecycle-state"] != "TERMINATING" and .["lifecycle-state"] != "TERMINATED"'
          A1_FILTER="select(.shape==\"VM.Standard.A1.Flex\") | select($LIVE_STATES)"
          MICRO_FILTER="select(.shape==\"VM.Standard.E2.1.Micro\") | select($LIVE_STATES)"

          CURRENT_OCPUS=$(echo "$INSTANCES" | \
            jq "[.data[] | $A1_FILTER | (.\"shape-config\".ocpus // 0)] | add // 0")
          CURRENT_RAM=$(echo "$INSTANCES" | \
            jq "[.data[] | $A1_FILTER | (.\"shape-config\".\"memory-in-gbs\" // 0)] | add // 0")
          CURRENT_MICRO=$(echo "$INSTANCES" | \
            jq "[.data[] | $MICRO_FILTER] | length")

          REQUESTED_OCPUS=$(grep -oE 'ocpus\s*=\s*[0-9]+' tofu/oci/terraform.tfvars \
            | awk -F'=' '{s+=int($2)} END {print s+0}')
          REQUESTED_RAM=$(grep -oE 'memory_gb\s*=\s*[0-9]+' tofu/oci/terraform.tfvars \
            | awk -F'=' '{s+=int($2)} END {print s+0}')
          REQUESTED_MICRO=$(awk '/micro_nodes/ {count++} END {print count+0}' tofu/oci/terraform.tfvars)

          # OCI cut the Always Free Ampere A1 allowance to 2 OCPU / 12 GB (2 instances).
          # Verified against OCI docs + service limits on 2026-06-14, see
          # FREE_TIER_RESOURCES.md. Both Always Free and PAYG-with-Always-Free accounts
          # get the same 2/12 free grant. The old 4/24 figure is retired.
          MAX_AMPERE_OCPUS=2
          MAX_AMPERE_RAM_GB=12
          MAX_MICRO_INSTANCES=1

          echo "A1 live: ${CURRENT_OCPUS}/${MAX_AMPERE_OCPUS} OCPU, ${CURRENT_RAM}/${MAX_AMPERE_RAM_GB} GB"
          echo "A1 tfvars: ${REQUESTED_OCPUS} OCPU, ${REQUESTED_RAM} GB"
          echo "Micro: live=${CURRENT_MICRO}, tfvars=${REQUESTED_MICRO}, limit=${MAX_MICRO_INSTANCES}"

          FAIL=0
          if [ "$(echo "$REQUESTED_OCPUS > $MAX_AMPERE_OCPUS" | bc)" = "1" ]; then
            echo "ERROR: tfvars requests ${REQUESTED_OCPUS} A1 OCPU but limit is ${MAX_AMPERE_OCPUS}"
            FAIL=1
          fi
          if [ "$(echo "$CURRENT_OCPUS > $MAX_AMPERE_OCPUS" | bc)" = "1" ]; then
            echo "ERROR: live A1 OCPU=${CURRENT_OCPUS} already exceeds limit=${MAX_AMPERE_OCPUS} — drift detected"
            FAIL=1
          fi
          if [ "$(echo "$REQUESTED_RAM > $MAX_AMPERE_RAM_GB" | bc)" = "1" ]; then
            echo "ERROR: tfvars requests ${REQUESTED_RAM} GB A1 RAM but limit is ${MAX_AMPERE_RAM_GB} GB"
            FAIL=1
          fi
          if [ "$(echo "$CURRENT_RAM > $MAX_AMPERE_RAM_GB" | bc)" = "1" ]; then
            echo "ERROR: live A1 RAM=${CURRENT_RAM} GB already exceeds limit=${MAX_AMPERE_RAM_GB} GB — drift detected"
            FAIL=1
          fi
          if [ "$REQUESTED_MICRO" -gt "$MAX_MICRO_INSTANCES" ]; then
            echo "ERROR: tfvars requests ${REQUESTED_MICRO} Micro but limit is ${MAX_MICRO_INSTANCES}"
            FAIL=1
          fi
          if [ "$CURRENT_MICRO" -gt "$MAX_MICRO_INSTANCES" ]; then
            echo "ERROR: live Micro=${CURRENT_MICRO} exceeds limit=${MAX_MICRO_INSTANCES} — drift"
            FAIL=1
          fi
          exit $FAIL

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2.0.0
        with:
          tofu_version: "1.11.5"

      - name: Tofu Init
        working-directory: tofu/oci
        run: tofu init -backend-config=backend-config.tfvars

      - name: Tofu Plan
        working-directory: tofu/oci
        run: |
          TARGET_ARGS=""
          for t in $TARGETS; do TARGET_ARGS="$TARGET_ARGS -target=$t"; done
          [ -n "$TARGET_ARGS" ] && echo "Targeted plan:$TARGET_ARGS"
          DESTROY_ARG=""
          if [ "$DESTROY" = "true" ]; then
            if [ -z "$TARGETS" ]; then
              echo "ERROR: destroy=true requires explicit targets"
              exit 1
            fi
            DESTROY_ARG="-destroy"
            echo "Targeted destroy enabled"
          fi
          tofu plan \
            -lock=false \
            $TARGET_ARGS \
            $DESTROY_ARG \
            -var="tenancy_ocid=$OCI_TENANCY_OCID" \
            -var="compartment_ocid=$OCI_COMPARTMENT_OCID" \
            -var="talos_image_ocid=${{ steps.talos_image.outputs.ocid }}" \
            -var="omni_machine_config=$OMNI_MACHINE_CONFIG" \
            -var="omni_join_token=$OMNI_JOIN_TOKEN" \
            -var="omni_endpoint=$OMNI_ENDPOINT" \
            -var="tailscale_auth_key=$NODES_TAILSCALE_AUTHKEY" \
            -var="oci_config_profile=DEFAULT" \
            -var="enable_oci_vpn=true" \
            -var="enable_oci_vpn_probe=$VPN_PROBE" \
            -var="openwrt_resolver_ip=10.10.210.1" \
            -var-file=terraform.tfvars \
            -out=tfplan
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OMNI_MACHINE_CONFIG: ${{ secrets.OMNI_MACHINE_CONFIG }}
          OMNI_JOIN_TOKEN: ${{ secrets.OMNI_JOIN_TOKEN }}
          OMNI_ENDPOINT: ${{ secrets.OMNI_ENDPOINT }}
          NODES_TAILSCALE_AUTHKEY: ${{ secrets.NODES_TAILSCALE_AUTHKEY }}
          TARGETS: ${{ github.event.inputs.targets }}
          VPN_PROBE: ${{ github.event.inputs.vpn_probe || 'false' }}
          DESTROY: ${{ github.event.inputs.destroy || 'false' }}
          TF_LOG: WARN

      - name: Reject destructive plan
        working-directory: tofu/oci
        run: |
          tofu show -json tfplan \
            | jq -r '.resource_changes[]
              | select(.change.actions | index("delete"))
              | "\(.address)\t\(.change.actions | join(","))"' \
            > destructive-changes.txt

          if [ -s destructive-changes.txt ]; then
            if { [ "$DESTROY" = "true" ] || [ "$ALLOW_REPLACE" = "true" ]; } && [ -n "$TARGETS" ]; then
              FAIL=0
              while IFS="$(printf '\t')" read -r address actions; do
                MATCH=0
                for target in $TARGETS; do
                  if [ "$address" = "$target" ] || [[ "$address" == "$target["* ]]; then
                    MATCH=1
                  fi
                done
                if [ "$MATCH" -ne 1 ]; then
                  echo "ERROR: destructive change outside requested targets: $address $actions"
                  FAIL=1
                fi
              done < destructive-changes.txt
              if [ "$FAIL" -eq 0 ]; then
                echo "Allowing explicit targeted destructive changes:"
                cat destructive-changes.txt
                exit 0
              fi
            fi
            echo "ERROR: plan contains destructive changes; refusing to upload/apply tfplan."
            cat destructive-changes.txt
            exit 1
          fi
        env:
          TARGETS: ${{ github.event.inputs.targets }}
          DESTROY: ${{ github.event.inputs.destroy || 'false' }}
          ALLOW_REPLACE: ${{ github.event.inputs.allow_replace || 'false' }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tofu/oci/tfplan
          retention-days: 1

  apply:
    name: Tofu Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write OCI credentials
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_API_KEY_PEM" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          OCI_REGION: ${{ secrets.OCI_REGION }}

      - name: Write backend config
        run: printf '%s' "$TF_BACKEND_CONFIG" > tofu/oci/backend-config.tfvars
        env:
          TF_BACKEND_CONFIG: ${{ secrets.TF_BACKEND_CONFIG }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2.0.0
        with:
          tofu_version: "1.11.5"

      - name: Tofu Init
        working-directory: tofu/oci
        run: tofu init -backend-config=backend-config.tfvars

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: tofu/oci

      - name: Tofu Apply
        working-directory: tofu/oci
        run: tofu apply -lock=false -auto-approve tfplan
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          TF_LOG: WARN
