name: Cleanup OCI Storage (Safe)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no deletes)"
        required: true
        default: true
        type: boolean
      keep_days:
        description: "Minimum age in days before eligible for deletion"
        required: true
        default: "2"
      bootvol_grace_hours:
        description: "Minimum age in hours for TERMINATED boot volumes"
        required: true
        default: "6"

env:
  OCI_COMPARTMENT: ocid1.compartment.oc1..aaaaaaaahox2upn7fvv4mhoifgbnshs42xlejatfcinkje26faq7yds3yffq
  OCI_NAMESPACE: lrbmlfacfnqw
  OCI_BUCKET: proxmox-images
  OCI_REGION: uk-london-1

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq python3-pip
          pip3 install oci-cli --quiet

      - name: Configure OCI CLI (syscode-homelab)
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF_CONFIG
          [syscode-homelab]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${OCI_REGION}
          key_file=~/.oci/oci_api_key.pem
          EOF_CONFIG
          echo "${{ secrets.OCI_API_KEY_PEM }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Safe cleanup (guarded)
        env:
          OCI_PROFILE: syscode-homelab
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          KEEP_DAYS: ${{ github.event.inputs.keep_days }}
          BOOTVOL_GRACE_HOURS: ${{ github.event.inputs.bootvol_grace_hours }}
          OCI_TIMEOUT_SEC: "60"
          OCI_RETRIES: "5"
        run: |
          scripts/cleanup-oci-storage-safe.sh

      - name: Summary
        run: |
          {
            echo "### OCI Safe Cleanup"
            echo ""
            echo "- Dry run: \`${{ github.event.inputs.dry_run }}\`"
            echo "- Keep days: \`${{ github.event.inputs.keep_days }}\`"
            echo "- Boot volume grace hours: \`${{ github.event.inputs.bootvol_grace_hours }}\`"
            echo "- Compartment: \`${OCI_COMPARTMENT}\`"
            echo "- Bucket: \`${OCI_BUCKET}\`"
          } >> "$GITHUB_STEP_SUMMARY"
