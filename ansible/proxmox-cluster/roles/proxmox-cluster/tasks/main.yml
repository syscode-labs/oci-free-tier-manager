---
# Proxmox cluster formation via pvecm
# Node with proxmox_primary: true creates the cluster.
# All other nodes join it.

- name: Set hostname to Proxmox node name
  hostname:
    name: "{{ proxmox_node_name }}"

- name: Update /etc/hosts with node name
  lineinfile:
    path: /etc/hosts
    regexp: "^{{ ansible_default_ipv4.address }}"
    line: "{{ ansible_default_ipv4.address }} {{ proxmox_node_name }}.proxmox.local {{ proxmox_node_name }}"
    state: present

- name: Enable and start HA services on primary node
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - pve-ha-lrm
    - pve-ha-crm
  when: proxmox_primary | bool

- name: Enable HA services on joiners (start after cluster join)
  systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - pve-ha-lrm
    - pve-ha-crm
  when: not proxmox_primary | bool

- name: Check if already in a cluster
  command: pvecm status
  register: pvecm_status
  failed_when: false
  changed_when: false

- name: Create cluster on primary node
  command: "pvecm create {{ cluster_name }} --link0 {{ ansible_facts[corosync_link_interface].ipv4.address }}"
  when:
    - proxmox_primary | bool
    - "'cluster name' not in pvecm_status.stdout"

- name: Wait for cluster to initialise on primary
  pause:
    seconds: 10
  when: proxmox_primary | bool

- name: Get primary node hostname for join
  set_fact:
    primary_host: >-
      {{ groups['proxmox']
         | map('extract', hostvars)
         | selectattr('proxmox_primary', 'defined')
         | selectattr('proxmox_primary', 'equalto', true)
         | map(attribute='inventory_hostname')
         | first }}

- name: Join cluster (non-primary nodes)
  command: >
    pvecm add
    {{ hostvars[primary_host].ansible_default_ipv4.address }}
    --use_ssh
    --link0 {{ ansible_facts[corosync_link_interface].ipv4.address }}
  when:
    - not proxmox_primary | bool
    - "'cluster name' not in pvecm_status.stdout"

- name: Wait for cluster quorum
  command: pvecm status
  register: quorum_status
  until: "'quorate' in quorum_status.stdout"
  retries: 30
  delay: 10
  changed_when: false

- name: Verify cluster quorum
  debug:
    msg: "Cluster {{ cluster_name }} quorum achieved"
  when: "'quorate' in quorum_status.stdout"
