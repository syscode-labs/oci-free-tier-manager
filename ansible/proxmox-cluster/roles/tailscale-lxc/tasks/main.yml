---
# Deploy Tailscale LXC container on each Proxmox node

- name: Set per-node LXC container ID
  set_fact:
    lxc_id: "{{ lxc_id_start | int + groups['proxmox'].index(inventory_hostname) }}"

- name: Check if container template exists
  stat:
    path: "/var/lib/vz/template/cache/{{ lxc_template }}"
  register: template_stat

- name: Download Debian 12 ARM64 LXC template
  get_url:
    url: "{{ lxc_template_url }}"
    dest: "/var/lib/vz/template/cache/{{ lxc_template }}"
    mode: "0644"
  when: not template_stat.stat.exists

- name: Check if container already exists
  command: "pct status {{ lxc_id }}"
  register: pct_status
  failed_when: false
  changed_when: false

- name: Create Tailscale LXC container
  command: >
    pct create {{ lxc_id }}
    local:vztmpl/{{ lxc_template }}
    --hostname tailscale-{{ proxmox_node_name }}
    --memory {{ lxc_memory }}
    --rootfs local-lvm:{{ lxc_disk_size }}
    --net0 name=eth0,bridge=vmbr0,ip=dhcp
    --unprivileged 1
    --features keyctl=1,nesting=1
    --start 1
    --onboot 1
  when: "'does not exist' in pct_status.stderr or pct_status.rc != 0"

- name: Ensure container is running
  command: "pct start {{ lxc_id }}"
  register: pct_start_result
  failed_when:
    - pct_start_result.rc != 0
    - "'is already running' not in pct_start_result.stderr"
  changed_when: pct_start_result.rc == 0

- name: Wait for container network
  pause:
    seconds: 5

- name: Check if Tailscale already installed in container
  command: "pct exec {{ lxc_id }} -- which tailscale"
  register: ts_check
  failed_when: false
  changed_when: false

- name: Download Tailscale install script on Proxmox host
  get_url:
    url: "https://tailscale.com/install.sh"
    dest: "/tmp/tailscale-install.sh"
    mode: "0755"
  when: ts_check.rc != 0

- name: Push install script into container
  command: "pct push {{ lxc_id }} /tmp/tailscale-install.sh /tmp/tailscale-install.sh"
  when: ts_check.rc != 0

- name: Install Tailscale in container
  command: "pct exec {{ lxc_id }} -- bash /tmp/tailscale-install.sh"
  when: ts_check.rc != 0

- name: Join Tailscale mesh
  command: >
    pct exec {{ lxc_id }} -- tailscale up
    --authkey {{ tailscale_authkey }}
    --hostname proxmox-{{ proxmox_node_name }}
    --accept-routes
    --tun=userspace-networking
  when: tailscale_authkey != ""
  no_log: true
