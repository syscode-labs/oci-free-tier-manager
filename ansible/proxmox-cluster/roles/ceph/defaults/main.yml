---
ceph_network: "10.0.1.0/24"    # OCI VCN subnet CIDR — adjust to match tofu/oci output
ceph_pool_name: "vm-storage"
ceph_pool_replicas: 3           # 3 nodes → 3 replicas
# WARNING: Empty string = use LVM on boot disk. FOR DEV/TEST ONLY.
# In production, set this to a dedicated block device (e.g. /dev/sdb).
# Using the boot disk for Ceph OSD risks data loss if Ceph claims the LV.
ceph_osd_device: ""
ceph_osd_lv_size: "20G"         # Reserve 20G of boot disk for Ceph OSD
allow_boot_disk_osd: false  # Set true only in dev/test environments
