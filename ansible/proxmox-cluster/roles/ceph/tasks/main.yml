---
# Ceph setup via pveceph on Proxmox ARM64
# Run only after proxmox-cluster role completes (quorum must be established)

- name: Check if Ceph packages already installed
  command: dpkg -l ceph-mon
  register: ceph_pkg_check
  failed_when: false
  changed_when: false

# pveceph install is interactive — pipe 'y' to accept the EULA
- name: Install Ceph packages via pveceph (primary node only)
  shell: echo 'y' | pveceph install
  when:
    - proxmox_primary | bool
    - ceph_pkg_check.rc != 0
  changed_when: true

- name: Wait for Ceph packages on non-primary nodes
  shell: echo 'y' | pveceph install
  when:
    - not proxmox_primary | bool
    - ceph_pkg_check.rc != 0
  changed_when: true

- name: Check if Ceph already initialised
  stat:
    path: /etc/ceph/ceph.conf
  register: ceph_conf_stat

- name: Initialise Ceph on primary node
  command: "pveceph init --network {{ ceph_network }}"
  when:
    - proxmox_primary | bool
    - not ceph_conf_stat.stat.exists

- name: Wait for Ceph init to propagate
  pause:
    seconds: 15
  when: proxmox_primary | bool

- name: Create Ceph monitor on each node
  command: "pveceph mon create"
  register: mon_result
  failed_when:
    - mon_result.rc != 0
    - "'already exists' not in mon_result.stderr"
  changed_when: "'already exists' not in mon_result.stderr"

- name: Create Ceph manager on each node
  command: "pveceph mgr create"
  register: mgr_result
  failed_when:
    - mgr_result.rc != 0
    - "'already exists' not in mgr_result.stderr"
  changed_when: "'already exists' not in mgr_result.stderr"

- name: Check if OSD LV already exists
  command: lvs --noheadings -o lv_name vg0
  register: lv_list
  failed_when: false
  changed_when: false

- name: Fail if ceph_osd_device is empty and this looks like production
  fail:
    msg: >
      ceph_osd_device is empty, which will use the boot disk for Ceph OSD.
      This is FOR DEV/TEST ONLY and risks data loss.
      Set ceph_osd_device to a dedicated block device (e.g. /dev/sdb) or
      set allow_boot_disk_osd=true to suppress this check.
  when:
    - ceph_osd_device | length == 0
    - not (allow_boot_disk_osd | default(false) | bool)

- name: Create LVM volume for Ceph OSD on boot disk
  block:
    - name: Find the boot disk device
      shell: lsblk -dpno NAME | grep -v loop | head -1
      register: boot_disk
      changed_when: false

    - name: Check if vg0 already exists
      command: vgs --noheadings -o vg_name
      register: vg_list
      failed_when: false
      changed_when: false

    - name: Create or extend VG
      command: "vgcreate vg0 {{ boot_disk.stdout }}"
      when: "'vg0' not in vg_list.stdout"
      failed_when: false

    - name: Create logical volume for OSD
      command: "lvcreate -L {{ ceph_osd_lv_size }} -n ceph-osd vg0"
      when: "'ceph-osd' not in lv_list.stdout"
  when: ceph_osd_device | length == 0

- name: Create Ceph OSD on each node
  command: >
    pveceph osd create
    {{ '/dev/vg0/ceph-osd' if ceph_osd_device | length == 0 else ceph_osd_device }}
  register: osd_result
  failed_when:
    - osd_result.rc != 0
    - "'already exists' not in osd_result.stderr"
  changed_when: "'already exists' not in osd_result.stderr"

- name: Create Ceph pool for VM storage (primary node only)
  command: >
    pveceph pool create {{ ceph_pool_name }}
    --add_storages --size {{ ceph_pool_replicas }}
  when: proxmox_primary | bool
  register: pool_result
  failed_when:
    - pool_result.rc != 0
    - "'already exists' not in pool_result.stderr"
  changed_when: "'already exists' not in pool_result.stderr"

- name: Wait for Ceph health
  command: ceph health
  register: ceph_health
  until: "'HEALTH_OK' in ceph_health.stdout or 'HEALTH_WARN' in ceph_health.stdout"
  retries: 30
  delay: 10
  changed_when: false

- name: Show Ceph status
  command: ceph -s
  register: ceph_status
  changed_when: false

- name: Print Ceph status
  debug:
    msg: "{{ ceph_status.stdout_lines }}"
