package:
  proxmox-ve:
    installed: true
  pve-kernel-6.8:
    installed: true
  chrony:
    installed: true
  open-iscsi:
    installed: true
  ifupdown2:
    installed: true
  fail2ban:
    installed: true

service:
  chrony:
    enabled: true
  pvedaemon:
    enabled: true
  pveproxy:
    enabled: true
  fail2ban:
    enabled: true

file:
  /etc/apt/sources.list.d/pve-install-repo.list:
    exists: true
    contains:
      - "mirrors.apqa.cn"
  /etc/apt/sources.list.d/ceph.list:
    exists: true
    contains:
      - "mirrors.apqa.cn"
  /etc/sysctl.d/99-proxmox-forwarding.conf:
    exists: true
    contains:
      - "net.ipv4.ip_forward = 1"
  /etc/modprobe.d/zfs.conf:
    exists: true
    contains:
      - "zfs_arc_max"
  /etc/fail2ban/filter.d/proxmox.conf:
    exists: true
